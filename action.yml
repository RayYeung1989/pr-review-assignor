name: 'PR Review Assignor'

description: 'Automatically assign reviewers based on file changes in pull requests'

author: 'Auto Company'

branding:
  icon: 'users'
  color: 'purple'

inputs:
  token:
    description: 'GitHub token'
    required: true
  config-file:
    description: 'Path to configuration file'
    default: '.github/review-assign.yml'
  default-reviewers:
    description: 'Default reviewers if no match found (comma-separated)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: 'Checkout'
      uses: actions/checkout@v4

    - name: 'Assign Reviewers'
      shell: bash
      env:
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_CONFIG_FILE: ${{ inputs.config-file }}
        INPUT_DEFAULT_REVIEWERS: ${{ inputs.default-reviewers }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        # PR Review Assignor - Auto assign reviewers based on file changes

        CONFIG_FILE="$INPUT_CONFIG_FILE"
        DEFAULT_REVIEWERS="$INPUT_DEFAULT_REVIEWERS"

        # Get PR files
        FILES_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --jq '.[].filename')

        echo "PR files:"
        echo "$FILES_JSON"
        echo "---"

        # Parse config (simple key=value format)
        declare -A REVIEWER_MAP

        if [ -f "$CONFIG_FILE" ]; then
          while IFS= read -r line; do
            # Skip comments and empty lines
            [[ "$line" =~ ^# ]] && continue
            [[ -z "$line" ]] && continue

            # Format: path-prefix: reviewer1,reviewer2
            PREFIX=$(echo "$line" | cut -d: -f1 | xargs)
            REVIEWERS=$(echo "$line" | cut -d: -f2- | xargs)

            if [ -n "$PREFIX" ] && [ -n "$REVIEWERS" ]; then
              REVIEWER_MAP["$PREFIX"]="$REVIEWERS"
            fi
          done < "$CONFIG_FILE"
        fi

        # Find matching reviewers
        ASSIGNED=()

        for FILE in $FILES_JSON; do
          for PREFIX in "${!REVIEWER_MAP[@]}"; do
            if [[ "$FILE" == *"$PREFIX"* ]] || [[ "$FILE" == "$PREFIX"* ]]; then
              REVIEWERS="${REVIEWER_MAP[$PREFIX]}"
              IFS=',' read -ra REVIEWER_LIST <<< "$REVIEWERS"
              for R in "${REVIEWER_LIST[@]}"; do
                R=$(echo "$R" | xargs)
                if [[ ! " ${ASSIGNED[*]} " =~ " ${R} " ]]; then
                  ASSIGNED+=("$R")
                fi
              done
            fi
          done
        done

        # Add default reviewers if no match
        if [ ${#ASSIGNED[@]} -eq 0 ] && [ -n "$DEFAULT_REVIEWERS" ]; then
          IFS=',' read -ra DEFAULT_LIST <<< "$DEFAULT_REVIEWERS"
          for R in "${DEFAULT_LIST[@]}"; do
            ASSIGNED+=("$(echo "$R" | xargs)")
          done
        fi

        # Assign reviewers
        if [ ${#ASSIGNED[@]} -gt 0 ]; then
          echo "Assigning reviewers: ${ASSIGNED[*]}"
          REVIEWERS_JSON=$(printf '"%s",' "${ASSIGNED[@]}")
          REVIEWERS_JSON="[${REVIEWERS_JSON%,}]"

          gh api "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
            -X POST \
            -F "reviewers=$REVIEWERS_JSON" \
            --silent

          echo "✓ Assigned ${#ASSIGNED[@]} reviewer(s)"
        else
          echo "No reviewers to assign"
        fi
